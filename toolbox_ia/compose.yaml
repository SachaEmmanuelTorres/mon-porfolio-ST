services:
  hermes-rag:
    build: ./hermes-rag
    container_name: hermes-rag
    volumes:
      - /media/sacha/de202ea4-0195-4fcc-85f1-3ca679ce2cdf1/models:/app/models:rw
    networks:
      - ai-net
    ports:
      - "5000:5000"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - /media/sacha/de202ea4-0195-4fcc-85f1-3ca679ce2cdf1/models:/root/.ollama/models:rw
    networks:
      - ai-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on: [ollama, hermes-rag]
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      - ai-net

  opencode-gui:
    build: ./opencode-gui
    container_name: opencode-gui
    volumes:
      - /media/sacha/de202ea4-0195-4fcc-85f1-3ca679ce2cdf1/models:/root/models:rw
      - ./logs:/root/logs:Z
      - ./data_io:/root/data:Z
      - ./training:/root/training:Z
    ports:
      - "6080:6080"
    networks:
      - ai-net

  openrouter-proxy:
    build: ./openrouter-proxy
    container_name: openrouter-proxy
    ports:
      - "4000:4000"
    networks:
      - ai-net

  homepage:
    image: nginx:alpine
    container_name: ia-homepage
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "8080:80"
    networks:
      - ai-net

  llamacpp:
    build: ./llamacpp-gui
    container_name: llamacpp
    volumes:
      - /media/sacha/de202ea4-0195-4fcc-85f1-3ca679ce2cdf1/models:/models:rw
      - ./logs:/var/log/llama-cpp:Z
      - ./data_io:/mnt/data:Z
      - ./training:/training_data:Z
    ports:
      - "8090:8090"
    networks:
      - ai-net
    command: ["--model", "/models/qwen2.5-3b-instruct.gguf", "--host", "0.0.0.0", "--port", "8090"]

networks:
  ai-net:
    driver: bridge
